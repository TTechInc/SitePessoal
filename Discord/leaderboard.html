<!DOCTYPE html>
<html lang="pt">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Leaderboard Discord</title>

    <link rel="stylesheet" href="../style.css">

    <style>
        .leaderboard-section {

            max-width: 1200px;
            margin: auto;
            padding: 40px 20px;

        }

        .leaderboard-title {

            text-align: center;
            margin-bottom: 40px;

        }

        .leaderboard-table {

            width: 100%;
            border-collapse: collapse;

        }

        .leaderboard-table th {

            cursor: pointer;
            transition: .2s;

        }

        .leaderboard-table th:hover {

            opacity: .7;

        }

        .leaderboard-table th,
        .leaderboard-table td {

            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, .1);

        }

        .load-more {

            margin-top: 30px;
            text-align: center;

        }

        .load-more button {

            padding: 12px 25px;
            cursor: pointer;
            font-size: 16px;

        }

        .rank1 {

            color: gold;
            font-weight: bold;

        }

        .rank2 {

            color: silver;
            font-weight: bold;

        }

        .rank3 {

            color: #cd7f32;
            font-weight: bold;

        }
    </style>

</head>

<body>

    <section class="leaderboard-section">

        <h1 class="leaderboard-title">
            Discord Leaderboard
        </h1>

        <table class="leaderboard-table">

            <thead>

                <tr>

                    <th>#</th>

                    <th>ID</th>

                    <th onclick="ordenar('XP')">
                        XP ▼
                    </th>

                    <th onclick="ordenar('NIVEL')">
                        Nível ▼
                    </th>

                    <th onclick="ordenar('NumProjetos')">
                        Projetos ▼
                    </th>

                    <th onclick="ordenar('Bumps')">
                        Bumps ▼
                    </th>

                </tr>

            </thead>

            <tbody id="leaderboard-body">

            </tbody>

        </table>

        <div class="load-more">

            <button onclick="carregarMais()">
                Carregar Mais
            </button>

        </div>

    </section>

    <script src="leaderboard.js"></script>

</body>

</html>
